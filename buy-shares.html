<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reserve Shares | APEX IPO ACCESS</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="js/supabase.js?v=1781218671"></script>
<script src="js/sidebar.js?v=1781218671"></script>
<script>
  // Auth guard
  document.addEventListener('sb-ready', async () => {
    const { data } = await sb.auth.getUser();
    if(!data.user) window.location.href = 'login.html';
  });
</script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#000;color:#fff;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}

  /* HEADER */
  .top-bar{
    position:sticky;top:0;z-index:100;
    background:rgba(0,0,0,0.92);backdrop-filter:blur(20px);
    border-bottom:1px solid rgba(255,255,255,0.08);
    padding:16px 20px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .back-btn{
    width:38px;height:38px;border-radius:50%;
    border:1px solid rgba(255,255,255,0.15);
    display:flex;align-items:center;justify-content:center;
    color:#4a9eff;background:none;cursor:pointer;
  }
  .top-title{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-weight:600;font-size:14px;color:#fff;letter-spacing:0.3px;
  }
  .top-spacer{width:38px}

  /* STEP INDICATOR */
  .step-bar{
    display:flex;justify-content:center;gap:8px;
    padding:18px 20px 8px;
  }
  .step-dot{
    width:34px;height:3px;border-radius:3px;
    background:rgba(255,255,255,0.1);transition:background .2s;
  }
  .step-dot.active{background:#4a9eff}
  .step-dot.done{background:#3ed598}

  /* PAGE */
  .page{max-width:560px;margin:0 auto;padding:8px 20px 140px}

  .lede{text-align:center;color:#8a94a3;font-size:12px;letter-spacing:0.4px;margin-bottom:8px;text-transform:uppercase;font-weight:600}
  h1{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-weight:600;font-size:28px;color:#fff;
    text-align:center;letter-spacing:-0.5px;margin-bottom:24px;
  }

  /* COMPANY CARD (top) */
  .co-card{
    display:flex;align-items:center;gap:14px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:14px;padding:16px;margin-bottom:24px;
  }
  .co-logo{
    width:54px;height:54px;border-radius:12px;
    background:#fff;flex-shrink:0;overflow:hidden;
    display:flex;align-items:center;justify-content:center;padding:6px;
  }
  .co-logo img{width:100%;height:100%;object-fit:contain}
  .co-info{flex:1;min-width:0}
  .co-name{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-weight:600;font-size:18px;color:#fff;letter-spacing:-0.2px;
  }
  .co-sector{font-size:12px;color:#8a94a3;margin-top:2px}
  .co-price{text-align:right;flex-shrink:0}
  .co-price .val{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-weight:600;font-size:18px;color:#fff;
  }
  .co-price .lbl{font-size:11px;color:#8a94a3;margin-top:2px}

  /* TIER SELECTOR */
  .section-h{
    font-size:13px;color:#a8b2c1;font-weight:600;
    letter-spacing:0.3px;margin:24px 0 10px;
  }
  .tier-list{display:flex;flex-direction:column;gap:10px}
  .tier{
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:12px;padding:14px 16px;
    cursor:pointer;transition:all .15s;
    position:relative;
  }
  .tier:hover{border-color:rgba(74,158,255,0.4)}
  .tier.selected{
    border-color:#4a9eff;
    background:linear-gradient(135deg,rgba(74,158,255,0.1),rgba(74,158,255,0.03));
  }
  .tier-top{
    display:flex;justify-content:space-between;align-items:center;gap:10px;
  }
  .tier-name{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-weight:600;font-size:15px;color:#fff;
    display:flex;align-items:center;gap:8px;
  }
  .tier-badge{
    font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;
    text-transform:uppercase;letter-spacing:0.5px;
  }
  .tier-badge.std  {background:rgba(255,255,255,0.08);color:#cfd8e8}
  .tier-badge.pri  {background:rgba(74,158,255,0.15);color:#4a9eff}
  .tier-badge.inst {background:rgba(255,184,0,0.15);color:#ffb800}
  .tier-min{font-size:13px;color:#a8b2c1;font-weight:500}
  .tier-desc{font-size:12px;color:#8a94a3;margin-top:6px;line-height:1.4}
  .tier-check{
    width:22px;height:22px;border-radius:50%;
    border:2px solid rgba(255,255,255,0.2);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .tier.selected .tier-check{background:#4a9eff;border-color:#4a9eff}
  .tier.selected .tier-check::after{
    content:"";width:8px;height:5px;
    border-left:2px solid #000;border-bottom:2px solid #000;
    transform:rotate(-45deg) translate(0,-1px);
  }

  /* AMOUNT INPUT */
  .amount-box{
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:14px;padding:18px;margin-top:8px;
  }
  .amount-row{
    display:flex;align-items:center;justify-content:space-between;gap:14px;
  }
  .amount-input{
    background:transparent;border:none;color:#fff;
    font-family:'Plus Jakarta Sans',sans-serif;
    font-weight:600;font-size:32px;letter-spacing:-0.5px;
    width:100%;outline:none;
    font-feature-settings:"tnum";
  }
  .amount-input::-webkit-outer-spin-button,
  .amount-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .amount-suffix{
    font-size:13px;color:#8a94a3;flex-shrink:0;letter-spacing:0.3px;
  }
  .amount-meta{
    display:flex;justify-content:space-between;
    margin-top:12px;padding-top:12px;
    border-top:1px solid rgba(255,255,255,0.06);
    font-size:12px;color:#8a94a3;
  }
  .amount-meta .v{color:#fff;font-weight:500}

  /* QUICK AMOUNT BUTTONS */
  .quick-row{
    display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
    margin-top:12px;
  }
  .quick-btn{
    background:rgba(74,158,255,0.06);
    border:1px solid rgba(74,158,255,0.18);
    color:#4a9eff;font-size:12px;font-weight:600;
    padding:9px;border-radius:8px;cursor:pointer;font-family:inherit;
  }
  .quick-btn:hover{background:rgba(74,158,255,0.12)}

  /* TOTAL SUMMARY */
  .total-card{
    background:linear-gradient(135deg,rgba(74,158,255,0.08),rgba(74,158,255,0.02));
    border:1px solid rgba(74,158,255,0.2);
    border-radius:14px;padding:16px 18px;margin-top:18px;
  }
  .total-row{
    display:flex;justify-content:space-between;align-items:center;
    font-size:13px;color:#a8b2c1;padding:5px 0;
  }
  .total-row .v{color:#fff;font-weight:500;font-feature-settings:"tnum"}
  .total-row.big{
    padding-top:12px;margin-top:6px;
    border-top:1px solid rgba(255,255,255,0.06);
    font-size:15px;
  }
  .total-row.big .lbl{font-weight:600;color:#fff}
  .total-row.big .v{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-weight:700;font-size:20px;color:#4a9eff;
  }
  .bonus-line{
    display:flex;align-items:center;gap:6px;
    font-size:11px;color:#3ed598;font-weight:600;
    margin-top:8px;padding-top:8px;
    border-top:1px dashed rgba(62,213,152,0.2);
  }
  .bonus-line svg{width:12px;height:12px}

  /* ERROR */
  .err{
    text-align:center;color:#ff6a6a;font-size:13px;
    margin:14px 0 0;min-height:16px;font-weight:500;
  }

  /* CONTINUE BAR */
  .continue-bar{
    position:fixed;bottom:0;left:0;right:0;
    background:rgba(0,0,0,0.95);backdrop-filter:blur(20px);
    padding:18px 20px 28px;
    border-top:1px solid rgba(255,255,255,0.08);
    z-index:50;
  }
  .continue-btn{
    display:block;width:100%;max-width:520px;margin:0 auto;
    background:#4a9eff;color:#000;
    padding:16px;text-align:center;
    font-family:'Plus Jakarta Sans',sans-serif;
    font-size:15px;font-weight:600;
    border:none;cursor:pointer;border-radius:12px;
    transition:background .15s;
  }
  .continue-btn:hover{background:#6db1ff}
  .continue-btn:disabled{background:#2a2f38;color:#5a6473;cursor:not-allowed}

  .skel{
    background:linear-gradient(90deg,rgba(255,255,255,0.04),rgba(255,255,255,0.08),rgba(255,255,255,0.04));
    background-size:200% 100%;animation:sk 1.4s infinite;
    border-radius:6px;color:transparent;
  }
  @keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}

  /* HOLDING PERIOD SELECTOR */
  .hold-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:4px}
  .hold-opt{
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:12px;padding:12px 14px;
    cursor:pointer;transition:all .15s;text-align:left;
    font-family:inherit;color:#fff;
  }
  .hold-opt:hover{border-color:rgba(74,158,255,0.4)}
  .hold-opt.selected{
    border-color:#4a9eff;
    background:linear-gradient(135deg,rgba(74,158,255,0.1),rgba(74,158,255,0.03));
  }
  .hold-name{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-weight:600;font-size:14px;color:#fff;
    display:flex;align-items:center;gap:6px;
  }
  .hold-perk{font-size:11px;color:#3ed598;font-weight:600;margin-top:4px}
  .hold-period{font-size:11px;color:#8a94a3;margin-top:2px}
</style>















</body>
</html>
