<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Email | APEX IPO ACCESS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Inter:wght@400;500;600&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#000;color:#fff;font-family:'Inter',sans-serif;min-height:100vh}
  .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{width:100%;max-width:440px;background:#0a0d12;border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:40px 32px;text-align:center}
  .brand{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:14px;letter-spacing:3px;color:#fff;margin-bottom:24px}
  .brand span{color:#4a9eff}
  .icon{width:64px;height:64px;border-radius:50%;background:rgba(74,158,255,0.08);border:1px solid rgba(74,158,255,0.25);display:inline-flex;align-items:center;justify-content:center;margin-bottom:20px}
  .icon svg{width:28px;height:28px;color:#4a9eff}
  h1{font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:22px;margin-bottom:10px}
  .sub{color:#8b95a8;font-size:14px;line-height:1.6;margin-bottom:24px}
  .sub b{color:#fff;font-weight:600;word-break:break-all}
  .codes{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
  .codes input{width:44px;height:54px;background:#000;border:1px solid rgba(255,255,255,0.12);border-radius:10px;color:#fff;font-size:22px;font-weight:600;text-align:center;font-family:'Manrope',sans-serif}
  .codes input:focus{outline:none;border-color:#4a9eff;box-shadow:0 0 0 3px rgba(74,158,255,0.15)}
  .codes input.success{border-color:#3ed598;color:#3ed598}
  .codes input.error{border-color:#ff6a6a;color:#ff8a8a}
  .msg{font-size:13px;min-height:18px;margin-bottom:18px;color:#8b95a8}
  .msg.err{color:#ff8a8a}
  .msg.ok{color:#3ed598}
  .btn{width:100%;padding:14px;background:#4a9eff;color:#000;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:14px}
  .btn:disabled{opacity:0.5;cursor:not-allowed}
  .resend-row{font-size:13px;color:#8b95a8;margin-bottom:24px}
  .resend-row button{background:none;border:none;color:#4a9eff;font-weight:600;cursor:pointer;font-family:inherit;font-size:13px;padding:4px 8px}
  .resend-row button:disabled{color:#3a4250;cursor:not-allowed}
  .foot{font-size:12px;color:#6a7585;padding-top:20px;border-top:1px solid rgba(255,255,255,0.05)}
  .foot a{color:#4a9eff;text-decoration:none}
</style>
</head>
<body>

<div class="wrap">
  <div class="card">
    <div class="brand">APEX <span>·</span> IPO ACCESS</div>
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </svg>
    </div>
    <h1>Verify your email</h1>
    <div class="sub">We've sent a 6-digit code to <b id="userEmail">loading...</b></div>

    <div class="codes">
      <input type="text" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
      <input type="text" maxlength="1" inputmode="numeric">
      <input type="text" maxlength="1" inputmode="numeric">
      <input type="text" maxlength="1" inputmode="numeric">
      <input type="text" maxlength="1" inputmode="numeric">
      <input type="text" maxlength="1" inputmode="numeric">
    </div>

    <div class="msg" id="msg">Loading...</div>

    <button class="btn" id="verifyBtn" disabled>Verify email</button>

    <div class="resend-row">
      Didn't receive the code? <button type="button" id="resendBtn" disabled>Resend</button> <span id="cooldown"></span>
    </div>

    <div class="foot">
      <a href="#" id="signoutLink">Sign out</a> · <a href="mailto:support@apexipoaccess.com">Contact support</a>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://tbivhlxkwtklhvsaggwg.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRiaXZobHhrd3RrbGh2c2FnZ3dnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMjc5MTEsImV4cCI6MjA5NjcwMzkxMX0.rw-LXJTPzYJu5TdEP0pgqUguviMJNwzJkpI5uGtR6XY';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const boxes = document.querySelectorAll('.codes input');
const msg = document.getElementById('msg');
const verifyBtn = document.getElementById('verifyBtn');
const resendBtn = document.getElementById('resendBtn');
const cooldownEl = document.getElementById('cooldown');

let user = null;
let profile = null;
let cooldownTimer = null;

function setMsg(text, type){
  var cleanText = String(text).replace(/^✓\s*/, '');
  if(type === 'ok'){
    msg.innerHTML = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:6px"><polyline points="20 6 9 17 4 12"/></svg>' + cleanText;
  } else {
    msg.textContent = cleanText;
  }
  msg.className = 'msg' + (type ? ' ' + type : '');
}

function genCode(){
  return Math.floor(100000 + Math.random() * 900000).toString();
}

async function sendCode(){
  if(!user){ setMsg('Not signed in.', 'err'); return false; }
  setMsg('Sending code...');

  const code = genCode();

  // Save to DB
  const { error: dbErr } = await sb.from('email_verification_codes').insert({
    user_id: user.id,
    code: code,
    expires_at: new Date(Date.now() + 10*60*1000).toISOString()
  });
  if(dbErr){ setMsg('DB error: ' + dbErr.message, 'err'); return false; }

  // Call edge function
  try {
    const { data: sessionData } = await sb.auth.getSession();
    const res = await fetch(SUPABASE_URL + '/functions/v1/send-email-verification', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + sessionData.session.access_token
      },
      body: JSON.stringify({
        email: user.email,
        code: code,
        firstName: profile?.first_name || ''
      })
    });
    if(!res.ok){
      const t = await res.text();
      setMsg('Send failed: ' + t.slice(0,100), 'err');
      return false;
    }
    setMsg('Code sent to ' + user.email, 'ok');
    return true;
  } catch(e){
    setMsg('Network error: ' + e.message, 'err');
    return false;
  }
}

function startCooldown(seconds){
  if(cooldownTimer) clearInterval(cooldownTimer);
  let s = seconds;
  resendBtn.disabled = true;
  cooldownEl.textContent = '(' + s + 's)';
  cooldownTimer = setInterval(() => {
    s--;
    cooldownEl.textContent = s > 0 ? '(' + s + 's)' : '';
    if(s <= 0){ clearInterval(cooldownTimer); resendBtn.disabled = false; }
  }, 1000);
}

async function verifyCode(code){
  verifyBtn.disabled = true;
  setMsg('Verifying...');

  const { data: codes, error } = await sb.from('email_verification_codes')
    .select('*')
    .eq('user_id', user.id)
    .eq('code', code)
    .is('used_at', null)
    .gt('expires_at', new Date().toISOString())
    .order('created_at', { ascending: false })
    .limit(1);

  if(error){ setMsg('Error: ' + error.message, 'err'); verifyBtn.disabled = false; return; }
  if(!codes || codes.length === 0){
    setMsg('Invalid or expired code.', 'err');
    boxes.forEach(b => b.classList.add('error'));
    setTimeout(() => boxes.forEach(b => { b.classList.remove('error'); b.value = ''; }), 700);
    boxes[0].focus();
    verifyBtn.disabled = false;
    return;
  }

  await sb.from('email_verification_codes').update({ used_at: new Date().toISOString() }).eq('id', codes[0].id);
  await sb.from('profiles').update({ email_verified_at: new Date().toISOString() }).eq('id', user.id);

  setMsg('Verified! Redirecting...', 'ok');
  boxes.forEach(b => b.classList.add('success'));
  setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
}

// Wire up code inputs
boxes.forEach((box, i) => {
  box.addEventListener('input', () => {
    box.value = box.value.replace(/\D/g, '').slice(0,1);
    if(box.value && i < boxes.length - 1) boxes[i+1].focus();
    const code = Array.from(boxes).map(b => b.value).join('');
    verifyBtn.disabled = code.length !== 6;
    if(code.length === 6) verifyCode(code);
  });
  box.addEventListener('keydown', e => {
    if(e.key === 'Backspace' && !box.value && i > 0) boxes[i-1].focus();
  });
  box.addEventListener('paste', e => {
    e.preventDefault();
    const paste = (e.clipboardData.getData('text') || '').replace(/\D/g,'').slice(0,6);
    paste.split('').forEach((d, j) => { if(boxes[j]) boxes[j].value = d; });
    boxes[Math.min(paste.length, boxes.length-1)].focus();
    if(paste.length === 6) verifyCode(paste);
  });
});

verifyBtn.addEventListener('click', () => {
  const code = Array.from(boxes).map(b => b.value).join('');
  if(code.length === 6) verifyCode(code);
});

resendBtn.addEventListener('click', async () => {
  const ok = await sendCode();
  if(ok) startCooldown(60);
});

document.getElementById('signoutLink').addEventListener('click', async e => {
  e.preventDefault();
  await sb.auth.signOut();
  window.location.href = 'login.html';
});

// Bootstrap
(async function init(){
  const { data: u } = await sb.auth.getUser();
  if(!u.user){ setMsg('Not signed in. Redirecting...', 'err'); setTimeout(() => location.href='login.html', 1500); return; }
  user = u.user;

  const { data: p } = await sb.from('profiles').select('*').eq('id', user.id).single();
  profile = p;

  if(!p || (p.kyc_status !== 'verified' && !p.is_admin)){
    setMsg('Account pending review. Redirecting...', 'err');
    setTimeout(() => location.href='pending-approval.html', 1500);
    return;
  }

  if(p.email_verified_at){
    setMsg('Already verified. Redirecting...', 'ok');
    setTimeout(() => location.href='dashboard.html', 1000);
    return;
  }

  document.getElementById('userEmail').textContent = user.email;
  setMsg('');

  // Auto-send first code
  const sent = await sendCode();
  if(sent) startCooldown(60);

  boxes[0].focus();
})();
</script>

</body>
</html>
