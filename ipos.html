<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#000;color:#fff;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}

  .dash-header{
    position:sticky;top:0;z-index:100;
    background:rgba(0,0,0,0.92);backdrop-filter:blur(20px);
    border-bottom:1px solid rgba(255,255,255,0.08);
    padding:16px 20px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .menu-btn{
    width:38px;height:38px;
    display:flex;flex-direction:column;justify-content:center;align-items:center;
    gap:5px;background:none;border:none;cursor:pointer;
  }
  .menu-btn span{width:22px;height:2px;background:#4a9eff;display:block;border-radius:2px}
  .header-icons{display:flex;gap:10px;align-items:center}
  .icon-btn{
    width:38px;height:38px;border-radius:50%;
    border:1px solid rgba(255,255,255,0.15);
    display:flex;align-items:center;justify-content:center;
    color:#4a9eff;background:none;cursor:pointer;position:relative;
  }

  .page-title{padding:24px 20px 8px;text-align:center}
  .page-title .lede{
    font-size:11px;color:#6a7585;font-weight:600;
    letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;
  }
  .page-title h1{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-weight:400;font-size:30px;color:#fff;letter-spacing:-0.6px;
  }
  .page-title .sub{
    font-size:13px;color:#8a94a3;margin-top:8px;
  }

  .wrap{max-width:680px;margin:0 auto;padding:8px 20px 120px}

  /* SEARCH BAR */
  .search-wrap{
    position:relative;margin-bottom:14px;
  }
  .search-input{
    width:100%;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:12px;
    padding:14px 16px 14px 44px;
    color:#fff;font-size:14px;font-family:inherit;
    transition:border .15s;
  }
  .search-input:focus{outline:none;border-color:#4a9eff;background:rgba(255,255,255,0.06)}
  .search-input::placeholder{color:#5a6473}
  .search-icon{
    position:absolute;left:14px;top:50%;transform:translateY(-50%);
    color:#5a6473;pointer-events:none;
  }
  .search-icon svg{width:18px;height:18px}
  .search-clear{
    position:absolute;right:10px;top:50%;transform:translateY(-50%);
    width:26px;height:26px;border-radius:50%;
    background:rgba(255,255,255,0.08);
    border:none;color:#8a94a3;cursor:pointer;
    display:none;align-items:center;justify-content:center;
  }
  .search-clear.show{display:flex}
  .search-clear svg{width:12px;height:12px}

  /* FILTER CHIPS */
  .filter-bar{
    display:flex;gap:8px;overflow-x:auto;
    margin:0 -20px 16px;padding:2px 20px 6px;
    scrollbar-width:none;
  }
  .filter-bar::-webkit-scrollbar{display:none}
  .chip{
    flex-shrink:0;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.1);
    color:#cfd8e8;
    padding:8px 14px;border-radius:20px;
    font-size:12px;font-weight:600;
    cursor:pointer;transition:all .15s;
    white-space:nowrap;
    display:inline-flex;align-items:center;gap:6px;
  }
  .chip:hover{border-color:rgba(74,158,255,0.4)}
  .chip.active{
    background:#4a9eff;color:#000;border-color:#4a9eff;
  }
  .chip .vrf{width:11px;height:11px;flex-shrink:0}
  .chip .count{
    background:rgba(0,0,0,0.15);
    padding:1px 6px;border-radius:8px;
    font-size:10px;font-weight:700;
  }
  .chip.active .count{background:rgba(0,0,0,0.2);color:#000}

  /* SORT BAR */
  .sort-bar{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:12px;font-size:12px;
  }
  .sort-count{color:#8a94a3;font-weight:500}
  .sort-count strong{color:#fff;font-weight:600}
  .sort-select{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.1);
    color:#cfd8e8;
    padding:7px 30px 7px 12px;
    border-radius:8px;font-size:12px;
    font-family:inherit;cursor:pointer;
    appearance:none;-webkit-appearance:none;
    background-image:url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234a9eff' stroke-width='2'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
    background-repeat:no-repeat;background-position:right 8px center;background-size:14px;
    font-weight:600;
  }
  .sort-select option{background:#0a0a0a;color:#fff}

  /* IPO GRID */
  .ipo-grid{
    display:flex;flex-direction:column;gap:10px;
  }
  .ipo-card{
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:14px;padding:14px 16px;
    cursor:pointer;transition:all .15s;
    display:flex;align-items:center;gap:14px;
    position:relative;
  }
  .ipo-card:hover{border-color:rgba(74,158,255,0.4)}
  .ipo-card.musk{
    background:linear-gradient(135deg,rgba(74,158,255,0.08),rgba(74,158,255,0.02));
    border-color:rgba(74,158,255,0.2);
  }
  .ipo-logo{
    width:48px;height:48px;border-radius:12px;
    background:#fff;flex-shrink:0;overflow:hidden;padding:6px;
    display:flex;align-items:center;justify-content:center;
  }
  .ipo-logo img{width:100%;height:100%;object-fit:contain}
  .ipo-body{flex:1;min-width:0}
  .ipo-name-row{
    display:flex;align-items:center;gap:6px;
    margin-bottom:3px;
  }
  .ipo-name{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-weight:600;font-size:15px;color:#fff;letter-spacing:-0.2px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .musk-badge{
    display:inline-flex;align-items:center;gap:3px;
    font-size:9px;font-weight:700;
    color:#4a9eff;background:rgba(74,158,255,0.12);
    padding:2px 7px;border-radius:10px;
    letter-spacing:0.3px;flex-shrink:0;
  }
  .musk-badge svg{width:11px;height:11px;flex-shrink:0}
  .ipo-meta{
    font-size:11px;color:#8a94a3;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    display:flex;align-items:center;gap:6px;
  }
  .stage-pill{
    font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;
    text-transform:uppercase;letter-spacing:0.3px;
    background:rgba(255,255,255,0.06);color:#cfd8e8;
  }
  .ipo-right{
    text-align:right;flex-shrink:0;min-width:80px;
  }
  .ipo-price{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-weight:600;font-size:14px;color:#fff;
    font-feature-settings:"tnum";
  }
  .ipo-return{
    font-size:11px;color:#3ed598;font-weight:600;margin-top:3px;
  }
  .ipo-return.high{color:#3ed598}
  .ipo-return.med{color:#4a9eff}

  /* HOT badge */
  .hot-badge{
    position:absolute;top:-6px;right:14px;
    background:linear-gradient(135deg,#ff6a00,#ff4a4a);
    color:#fff;font-size:9px;font-weight:800;
    padding:3px 8px;border-radius:6px;
    letter-spacing:0.5px;text-transform:uppercase;
    box-shadow:0 2px 8px rgba(255,74,74,0.3);
  }

  /* EMPTY STATE */
  .empty{
    background:rgba(255,255,255,0.03);
    border:1px dashed rgba(255,255,255,0.12);
    border-radius:16px;padding:40px 24px;text-align:center;
  }
  .empty-icon{
    width:60px;height:60px;border-radius:50%;
    background:rgba(74,158,255,0.1);
    display:inline-flex;align-items:center;justify-content:center;
    margin-bottom:14px;color:#4a9eff;
  }
  .empty-icon svg{width:28px;height:28px}
  .empty-title{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-weight:600;font-size:16px;color:#fff;margin-bottom:6px;
  }
  .empty-desc{
    color:#8a94a3;font-size:13px;line-height:1.5;
  }

  /* SKELETON */
  .skel-card{
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.06);
    border-radius:14px;padding:14px 16px;
    display:flex;gap:14px;align-items:center;
  }
  .skel{
    background:linear-gradient(90deg,rgba(255,255,255,0.04),rgba(255,255,255,0.1),rgba(255,255,255,0.04));
    background-size:200% 100%;animation:sk 1.4s infinite;
    border-radius:4px;
  }
  .skel.box{width:48px;height:48px;border-radius:12px;flex-shrink:0}
  .skel.line{height:12px;margin-bottom:6px}
  .skel.l1{width:60%}
  .skel.l2{width:40%}
  @keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}

  /* BOTTOM TAB NAV */
  .tab-nav{
    position:fixed;bottom:0;left:0;right:0;
    background:rgba(0,0,0,0.95);backdrop-filter:blur(20px);
    border-top:1px solid rgba(255,255,255,0.08);
    display:grid;grid-template-columns:repeat(5,1fr);
    padding:8px 0 14px;z-index:50;
  }
  .tab{
    display:flex;flex-direction:column;align-items:center;gap:4px;
    padding:8px 4px;color:#5a6473;cursor:pointer;transition:color .15s;
  }
  .tab.active{color:#4a9eff}
  .tab svg{width:20px;height:20px}
  .tab .lbl{font-size:10px;font-weight:500;letter-spacing:0.3px}
</style>
</head>

<script>
(async function(){
  if(!window.sb) await new Promise(r => document.addEventListener('sb-ready', r, { once:true }));

  const fmt = n => '$' + Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});

  // Verified badge SVG (reusable)
  const VRF_SVG = '<svg class="vrf" viewBox="0 0 22 22"><path fill="currentColor" d="M20.396 11c-.018-.646-.215-1.275-.57-1.816-.354-.54-.852-.972-1.438-1.246.223-.607.27-1.264.14-1.897-.131-.634-.437-1.218-.882-1.687-.47-.445-1.053-.751-1.687-.882-.633-.13-1.29-.083-1.897.14-.273-.587-.704-1.086-1.245-1.44S11.647 1.62 11 1.604c-.646.017-1.273.213-1.813.568s-.969.854-1.24 1.44c-.608-.223-1.267-.272-1.902-.14-.635.13-1.22.436-1.69.882-.445.47-.749 1.055-.878 1.688-.13.633-.08 1.29.144 1.896-.587.274-1.087.705-1.443 1.245-.356.54-.555 1.17-.574 1.817.02.647.218 1.276.574 1.817.356.54.856.972 1.443 1.245-.224.606-.274 1.263-.144 1.896.13.634.433 1.218.877 1.688.47.443 1.054.747 1.687.878.633.132 1.29.084 1.897-.136.274.586.705 1.084 1.246 1.439.54.354 1.17.551 1.816.569.647-.016 1.276-.213 1.817-.567s.972-.854 1.245-1.44c.604.239 1.266.296 1.903.164.636-.132 1.22-.447 1.68-.907.46-.46.776-1.044.908-1.681s.075-1.299-.165-1.903c.586-.274 1.084-.705 1.439-1.246.354-.54.551-1.17.569-1.816zM9.662 14.85l-3.429-3.428 1.293-1.302 2.072 2.072 4.4-4.794 1.347 1.246z"/></svg>';

  // Load all companies
  const { data: companies, error } = await sb.from('companies').select('*');
  if(error || !companies){
    document.getElementById('ipoGrid').innerHTML = `
      <div class="empty">
        <div class="empty-title">Could not load opportunities</div>
        <div class="empty-desc">${error?.message || 'Try refreshing the page'}</div>
      </div>`;
    return;
  }

  // Categorization
  function categoryOf(c){
    const s = (c.sector || '').toLowerCase();
    if(c.is_musk) return ['musk'];
    const cats = [];
    if(/\bai\b|foundation models|developer/.test(s)) cats.push('ai');
    if(/fintech|payment|bank|bnpl/.test(s)) cats.push('fintech');
    if(/social|communication/.test(s)) cats.push('social');
    if(/aerospace|satellite|infrastructure/.test(s)) cats.push('aerospace');
    if(/design|collaboration/.test(s)) cats.push('design');
    if(/saas|productivity|hr/.test(s)) cats.push('saas');
    if(/gaming|entertainment/.test(s)) cats.push('gaming');
    return cats;
  }

  function isHot(c){
    // Hot = high growth (parseable from growth_yoy)
    const m = (c.growth_yoy || '').match(/\+?(\d+)%?/);
    return m && parseInt(m[1]) >= 40;
  }

  // State
  let activeFilter = 'all';
  let activeSort = 'featured';
  let searchTerm = '';

  // Update counts
  document.getElementById('countAll').textContent = companies.length;

  function matchesFilter(c){
    if(activeFilter === 'all') return true;
    if(activeFilter === 'hot') return isHot(c);
    if(activeFilter === 'musk') return c.is_musk;
    return categoryOf(c).includes(activeFilter);
  }

  function matchesSearch(c){
    if(!searchTerm) return true;
    const t = searchTerm.toLowerCase();
    return (c.name || '').toLowerCase().includes(t)
        || (c.ticker || '').toLowerCase().includes(t)
        || (c.sector || '').toLowerCase().includes(t)
        || (c.ceo || '').toLowerCase().includes(t);
  }

  function sortCompanies(list){
    const arr = [...list];
    switch(activeSort){

<script>
document.addEventListener('DOMContentLoaded', function () {
  const els = document.querySelectorAll('a, button, [onclick], .quick-nav *, .quick-actions *, .shortcut *, .action-card *, .nav-card *');

  els.forEach(function (el) {
    const text  = ((el.textContent || '') + ' ' + (el.innerText || '')).replace(/\s+/g,' ').trim().toLowerCase();
    const aria  = (el.getAttribute('aria-label') || '').toLowerCase();
    const title = (el.getAttribute('title') || '').toLowerCase();
    const href  = (el.getAttribute('href') || '').trim().toLowerCase();
    const oc    = (el.getAttribute('onclick') || '').toLowerCase();

    const looksLikeDocs =
      /\bdocs\b/.test(text) || /\bdocuments?\b/.test(text) ||
      /\bdocs\b/.test(aria) || /\bdocuments?\b/.test(aria) ||
      /\bdocs\b/.test(title) || /\bdocuments?\b/.test(title);

    const isDead =
      href === '' || href === '#' || href === 'javascript:void(0)' || href === 'javascript:;' ||
      oc.includes('docs page coming soon') ||
      oc.includes('documents page coming soon') ||
      oc.includes('docs coming soon') ||
      oc.includes('documents coming soon');

    if (looksLikeDocs && isDead) {
      if (el.tagName === 'A') el.setAttribute('href', 'docs.html');
      el.setAttribute('onclick', "location.href='docs.html'");
      el.style.cursor = 'pointer';
    }
  });
});
</script>
