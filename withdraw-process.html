<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Withdrawal Submitted | APEX IPO ACCESS</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="js/supabase.js?v=1781218671"></script>
<script src="js/notify.js?v=1"></script>
<script src="js/sidebar.js?v=1781345031"></script>
<script>
  document.addEventListener('sb-ready', async () => {
    const { data } = await sb.auth.getUser();
    if(!data.user) window.location.href = 'login.html';
  });
</script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#000;color:#fff;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}

  .top-bar{
    padding:18px 20px;border-bottom:1px solid rgba(255,255,255,0.06);
    display:flex;justify-content:center;align-items:center;
  }
  .top-title{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-weight:600;font-size:14px;color:#fff;letter-spacing:0.3px;
  }

  .wrap{
    max-width:480px;margin:0 auto;padding:60px 24px;
    display:flex;flex-direction:column;align-items:center;text-align:center;
  }

  .spinner-wrap{width:120px;height:120px;position:relative;margin-bottom:32px}
  .spinner-bg{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle,rgba(74,158,255,0.15),transparent 70%)}
  .spinner{width:100%;height:100%;border:3px solid rgba(74,158,255,0.15);border-top-color:#4a9eff;border-radius:50%;animation:spin 1s linear infinite}
  .spinner-wrap.hide{display:none}
  @keyframes spin{to{transform:rotate(360deg)}}

  .success-icon{
    width:120px;height:120px;border-radius:50%;
    background:radial-gradient(circle,rgba(62,213,152,0.2),rgba(62,213,152,0.04));
    border:2px solid rgba(62,213,152,0.4);
    display:none;align-items:center;justify-content:center;
    margin-bottom:32px;animation:pop .5s cubic-bezier(.4,0,.2,1);
  }
  .success-icon.show{display:inline-flex}
  .success-icon svg{width:54px;height:54px;color:#3ed598}
  @keyframes pop{from{transform:scale(0.6);opacity:0}to{transform:scale(1);opacity:1}}

  .status{font-size:11px;font-weight:700;color:#4a9eff;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;transition:color .3s}
  .status.success{color:#3ed598}

  h1{font-family:'Plus Jakarta Sans',sans-serif;font-weight:500;font-size:26px;letter-spacing:-0.5px;color:#fff;margin-bottom:10px;line-height:1.2}
  .sub{color:#a8b2c1;font-size:14px;line-height:1.5;max-width:380px;margin-bottom:32px}

  .steps{display:flex;flex-direction:column;gap:14px;width:100%;max-width:360px;margin-bottom:32px;text-align:left}
  .step{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);transition:all .3s}
  .step.active{background:rgba(74,158,255,0.06);border-color:rgba(74,158,255,0.25)}
  .step.done{background:rgba(62,213,152,0.04);border-color:rgba(62,213,152,0.18)}
  .step-ic{width:28px;height:28px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.15);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#5a6473;font-size:13px;font-weight:700;transition:all .3s}
  .step.active .step-ic{border-color:#4a9eff;color:#4a9eff;animation:pulse 1.4s infinite}
  .step.done .step-ic{background:#3ed598;border-color:#3ed598;color:#000}
  .step.done .step-ic::after{content:"✓";font-size:14px}
  .step.done .step-ic .num{display:none}
  @keyframes pulse{50%{opacity:0.4}}
  .step-lbl{font-size:13px;color:#cfd8e8;font-weight:500}
  .step.done .step-lbl{color:#fff}

  .receipt{display:none;width:100%;max-width:380px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:18px;margin-bottom:24px;text-align:left}
  .receipt.show{display:block}
  .rec-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:13px;color:#a8b2c1;gap:12px}
  .rec-row .v{color:#fff;font-weight:500;font-feature-settings:"tnum";text-align:right;word-break:break-all}
  .rec-row.big{padding-top:12px;margin-top:6px;border-top:1px solid rgba(255,255,255,0.08);font-size:14px}
  .rec-row.big .lbl{font-weight:600;color:#fff}
  .rec-row.big .v{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:18px;color:#3ed598}
  .ref-line{font-family:'Manrope',sans-serif;font-size:11px;color:#6a7585;letter-spacing:0.5px;margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.05);text-align:center}

  .actions{display:none;flex-direction:column;gap:10px;width:100%;max-width:380px}
  .actions.show{display:flex}
  .btn{padding:15px;text-align:center;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;border:none;cursor:pointer;border-radius:12px;text-decoration:none;display:block}
  .btn-primary{background:#4a9eff;color:#000}
  .btn-primary:hover{background:#6db1ff}
  .btn-secondary{background:transparent;color:#4a9eff;border:1px solid rgba(74,158,255,0.35)}
  .btn-secondary:hover{background:rgba(74,158,255,0.08)}
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-title">APEX · IPO ACCESS</div>
</div>

<main class="wrap">

  <div class="spinner-wrap" id="spinnerWrap">
    <div class="spinner-bg"></div>
    <div class="spinner"></div>
  </div>

  <div class="success-icon" id="successIcon">
    <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10"/>
      <polyline points="9 12 11 14 15 10"/>
    </svg>
  </div>

  <div class="status" id="statusLbl">SUBMITTING</div>
  <h1 id="titleLbl">Sending your withdrawal request</h1>
  <p class="sub" id="subLbl">This only takes a moment…</p>

  <div class="steps" id="steps">
    <div class="step active" data-step="1">
      <div class="step-ic"><span class="num">1</span></div>
      <div class="step-lbl">Recording request</div>
    </div>
    <div class="step" data-step="2">
      <div class="step-ic"><span class="num">2</span></div>
      <div class="step-lbl">Notifying compliance team</div>
    </div>
    <div class="step" data-step="3">
      <div class="step-ic"><span class="num">3</span></div>
      <div class="step-lbl">Awaiting approval</div>
    </div>
  </div>

  <div class="receipt" id="receipt">
    <div class="rec-row">
      <span>Method</span>
      <span class="v" id="recMethod">—</span>
    </div>
    <div class="rec-row" id="recAssetRow" style="display:none">
      <span>Asset</span>
      <span class="v" id="recAsset">—</span>
    </div>
    <div class="rec-row" id="recDestRow" style="display:none">
      <span>Destination</span>
      <span class="v" id="recDest" style="font-family:'Manrope',sans-serif;font-size:11px">—</span>
    </div>
    <div class="rec-row">
      <span>Submitted</span>
      <span class="v" id="recDate">—</span>
    </div>
    <div class="rec-row">
      <span>Status</span>
      <span class="v" style="color:#ffb800">Pending review</span>
    </div>
    <div class="rec-row big">
      <span class="lbl">Amount requested</span>
      <span class="v" id="recAmount">$0.00</span>
    </div>
    <div class="ref-line">Reference: <span id="recRef">—</span></div>
  </div>

  <div class="actions" id="actions">
    <a href="dashboard.html" class="btn btn-primary">Back to Dashboard</a>
    <a href="account.html" class="btn btn-secondary">View account activity</a>
  </div>
</main>

<script>
  var method = sessionStorage.getItem('withdraw_method') || 'crypto';
  var amount = parseFloat(sessionStorage.getItem('withdraw_amount') || '0');
  var refCode = sessionStorage.getItem('withdraw_ref_code') || '—';
  var asset = sessionStorage.getItem('withdraw_asset') || null;
  var destination = sessionStorage.getItem('withdraw_destination') || null;

  if(!amount || amount <= 0){
    if(window.apexWarn) apexWarn('No withdrawal data — redirecting to dashboard');
    setTimeout(function(){ window.location.href = 'dashboard.html'; }, 1800);
  }

  var spinner = document.getElementById('spinnerWrap');
  var successIcon = document.getElementById('successIcon');
  var statusLbl = document.getElementById('statusLbl');
  var titleLbl = document.getElementById('titleLbl');
  var subLbl = document.getElementById('subLbl');
  var receipt = document.getElementById('receipt');
  var actions = document.getElementById('actions');

  function setStep(n){
    document.querySelectorAll('.step').forEach(function(s){
      var sn = parseInt(s.getAttribute('data-step'));
      s.classList.remove('active','done');
      if(sn < n) s.classList.add('done');
      else if(sn === n) s.classList.add('active');
    });
  }

  setTimeout(function(){ setStep(2); }, 1200);
  setTimeout(function(){ setStep(3); }, 2400);

  setTimeout(function(){
    document.querySelectorAll('.step').forEach(function(s){
      s.classList.remove('active');
      s.classList.add('done');
    });

    spinner.classList.add('hide');
    successIcon.classList.add('show');
    statusLbl.className = 'status success';
    statusLbl.textContent = 'SUBMITTED';
    titleLbl.textContent = 'Withdrawal request submitted';
    subLbl.textContent = method === 'crypto'
      ? "We'll process your crypto withdrawal within 24 business hours after compliance review."
      : "We'll wire funds to your bank within 1–3 business days after compliance review.";

    document.getElementById('recMethod').textContent = method === 'crypto' ? 'Cryptocurrency' : 'Bank Wire';
    document.getElementById('recAmount').textContent = '$' + amount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    document.getElementById('recDate').textContent = new Date().toLocaleString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit' });
    document.getElementById('recRef').textContent = refCode;

    if(asset){
      document.getElementById('recAssetRow').style.display = 'flex';
      document.getElementById('recAsset').textContent = asset;
    }
    if(destination){
      document.getElementById('recDestRow').style.display = 'flex';
      var short = destination.length > 22 ? destination.slice(0,10) + '…' + destination.slice(-8) : destination;
      document.getElementById('recDest').textContent = short;
    }

    receipt.classList.add('show');
    actions.classList.add('show');

    // Clear session for next withdrawal
    sessionStorage.removeItem('withdraw_method');
    sessionStorage.removeItem('withdraw_amount');
    sessionStorage.removeItem('withdraw_ref_code');
    sessionStorage.removeItem('withdraw_asset');
    sessionStorage.removeItem('withdraw_destination');

    if(window.apexSuccess) apexSuccess('Withdrawal request submitted');
  }, 3600);
</script>

<script src="js/floating-widget.js?v=1781343118" defer></script>

</body>
</html>
