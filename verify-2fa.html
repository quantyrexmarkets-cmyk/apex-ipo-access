<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Identity | APEX IPO ACCESS</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="js/supabase.js?v=100"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{
    background:#000;color:#fff;
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
  }

  .container{
    width:100%;max-width:400px;padding:24px;text-align:center;
  }

  .lock-icon{
    width:64px;height:64px;border-radius:50%;
    background:rgba(74,158,255,0.1);
    display:inline-flex;align-items:center;justify-content:center;
    margin-bottom:20px;
  }
  .lock-icon svg{width:28px;height:28px;color:#4a9eff}

  .title{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-weight:700;font-size:24px;color:#fff;
    letter-spacing:-0.5px;margin-bottom:8px;
  }
  .subtitle{
    font-size:13px;color:#8a94a3;line-height:1.6;
    margin-bottom:32px;
  }
  .subtitle .email-highlight{
    color:#4a9eff;font-weight:500;
  }

  /* Code input boxes */
  .code-wrap{
    display:flex;gap:10px;justify-content:center;
    margin-bottom:24px;
  }
  .code-box{
    width:52px;height:60px;
    background:rgba(255,255,255,0.04);
    border:2px solid rgba(255,255,255,0.1);
    border-radius:12px;
    text-align:center;
    font-family:'JetBrains Mono',monospace;
    font-size:24px;font-weight:700;color:#fff;
    outline:none;
    transition:border-color .15s;
    -webkit-appearance:none;
  }
  .code-box:focus{
    border-color:#4a9eff;
    background:rgba(74,158,255,0.05);
  }
  .code-box.error{
    border-color:#ff6a6a;
    background:rgba(255,106,106,0.05);
    animation:shake 0.4s;
  }
  .code-box.success{
    border-color:#3ed598;
    background:rgba(62,213,152,0.05);
  }

  @keyframes shake{
    0%,100%{transform:translateX(0)}
    25%{transform:translateX(-6px)}
    75%{transform:translateX(6px)}
  }

  .verify-btn{
    width:100%;padding:16px;border:none;border-radius:12px;
    background:linear-gradient(135deg,#4a9eff,#357abd);
    color:#fff;font-family:'Plus Jakarta Sans',sans-serif;
    font-weight:600;font-size:16px;cursor:pointer;
    transition:all .15s;margin-bottom:16px;
  }
  .verify-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(74,158,255,0.3)}
  .verify-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none}

  .resend-row{
    font-size:13px;color:#8a94a3;
  }
  .resend-row a{
    color:#4a9eff;font-weight:500;cursor:pointer;
    text-decoration:none;
  }
  .resend-row a.disabled{
    color:#5a6473;pointer-events:none;
  }

  .timer{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;color:#6a7585;
    margin-top:12px;
  }

  .error-msg{
    color:#ff6a6a;font-size:13px;
    margin-bottom:16px;display:none;
  }

  .back-link{
    display:inline-flex;align-items:center;gap:6px;
    color:#5a6473;font-size:12px;margin-top:24px;
    cursor:pointer;
  }
  .back-link:hover{color:#8a94a3}
  .back-link svg{width:14px;height:14px}
</style>















</body>
</html>
