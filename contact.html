<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Help & Support | APEX IPO ACCESS</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="js/supabase.js?v=100"></script>
<script src="js/sidebar.js?v=100" defer></script>
<script>
  document.addEventListener('sb-ready', async () => {
    const { data } = await sb.auth.getUser();
    if(!data.user) window.location.href = 'login.html';
  });
</script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#000;color:#fff;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
  a{color:inherit;text-decoration:none}

  .dash-header{
    position:sticky;top:0;z-index:100;
    background:rgba(0,0,0,0.92);backdrop-filter:blur(20px);
    border-bottom:1px solid rgba(255,255,255,0.08);
    padding:16px 20px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .menu-btn{width:38px;height:38px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:5px;background:none;border:none;cursor:pointer}
  .menu-btn span{width:22px;height:2px;background:#4a9eff;display:block;border-radius:2px}
  .header-icons{display:flex;gap:10px;align-items:center}
  .icon-btn{width:38px;height:38px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;color:#4a9eff;background:none;cursor:pointer}
  .logo{display:flex;align-items:center;gap:10px}
  .logo-x{height:32px}
  .logo-text-stack{display:flex;flex-direction:column;line-height:1}
  .logo-line1{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:15px;color:#fff;letter-spacing:2px}
  .logo-line2{font-size:7px;color:#4a9eff;letter-spacing:3px;font-weight:600}
  .logo-tagline{font-size:5.5px;color:#6a7585;letter-spacing:2.5px;margin-top:1px}

  .wrap{max-width:680px;margin:0 auto;padding:24px 20px 120px}
  .page-title{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:28px;color:#fff;letter-spacing:-0.5px;margin-bottom:6px}
  .page-sub{font-size:13px;color:#8a94a3;margin-bottom:28px;line-height:1.5}

  .quick-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:28px}
  .quick-tile{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:18px 16px;cursor:pointer;transition:all .15s;text-align:left}
  .quick-tile:hover{background:rgba(74,158,255,0.05);border-color:rgba(74,158,255,0.3);transform:translateY(-1px)}
  .quick-tile .ic{width:40px;height:40px;border-radius:10px;background:rgba(74,158,255,0.12);color:#4a9eff;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
  .quick-tile .ic svg{width:18px;height:18px}
  .quick-tile.green .ic{background:rgba(62,213,152,0.12);color:#3ed598}
  .quick-tile.amber .ic{background:rgba(255,184,0,0.12);color:#ffb800}
  .quick-tile.purple .ic{background:rgba(255,106,106,0.12);color:#ff6a6a}
  .quick-tile .title{font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:14px;color:#fff;letter-spacing:-0.2px;margin-bottom:3px}
  .quick-tile .desc{font-size:11px;color:#8a94a3;line-height:1.4}

  .sec-h{font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:18px;color:#fff;letter-spacing:-0.3px;margin:24px 0 14px}
</style>















</body>
</html>
