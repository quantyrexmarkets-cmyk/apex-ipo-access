<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wire Transfer | APEX IPO ACCESS</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="js/supabase.js?v=100"></script>
<script src="js/sidebar.js?v=100" defer></script>
<script>
  document.addEventListener('sb-ready', async () => {
    const { data } = await sb.auth.getUser();
    if(!data.user) window.location.href = 'login.html';
  });
</script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#000;color:#fff;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
  a{color:inherit;text-decoration:none}

  .dash-header{
    position:sticky;top:0;z-index:100;
    background:rgba(0,0,0,0.92);backdrop-filter:blur(20px);
    border-bottom:1px solid rgba(255,255,255,0.08);
    padding:16px 20px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .menu-btn{
    width:38px;height:38px;display:flex;flex-direction:column;
    justify-content:center;align-items:center;gap:5px;
    background:none;border:none;cursor:pointer;
  }
  .menu-btn span{width:22px;height:2px;background:#4a9eff;display:block;border-radius:2px}
  .header-icons{display:flex;gap:10px;align-items:center}
  .icon-btn{
    width:38px;height:38px;border-radius:50%;
    border:1px solid rgba(255,255,255,0.15);
    display:flex;align-items:center;justify-content:center;
    color:#4a9eff;background:none;cursor:pointer;
  }
  .logo{display:flex;align-items:center;gap:10px}
  .logo-x{height:32px}
  .logo-text-stack{display:flex;flex-direction:column;line-height:1}
  .logo-line1{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:15px;color:#fff;letter-spacing:2px}
  .logo-line2{font-size:7px;color:#4a9eff;letter-spacing:3px;font-weight:600}
  .logo-tagline{font-size:5.5px;color:#6a7585;letter-spacing:2.5px;margin-top:1px}

  .wrap{max-width:600px;margin:0 auto;padding:20px 20px 120px}

  .back-btn{
    display:inline-flex;align-items:center;gap:6px;
    color:#4a9eff;font-size:13px;font-weight:500;
    margin-bottom:20px;cursor:pointer;
  }
  .back-btn svg{width:16px;height:16px}

  .page-h{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-weight:700;font-size:24px;color:#fff;
    letter-spacing:-0.5px;margin-bottom:4px;
  }
  .page-sub{font-size:13px;color:#8a94a3;margin-bottom:24px}

  .amount-banner{
    background:linear-gradient(135deg,rgba(74,158,255,0.12),rgba(74,158,255,0.04));
    border:1px solid rgba(74,158,255,0.2);
    border-radius:14px;padding:18px;
    text-align:center;margin-bottom:24px;
  }
  .amount-banner .lbl{font-size:12px;color:#8a94a3;margin-bottom:4px}
  .amount-banner .val{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-size:32px;font-weight:300;color:#fff;
    letter-spacing:-0.5px;
  }

  .info-card{
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:14px;padding:20px;margin-bottom:16px;
  }
  .info-card .title{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-weight:600;font-size:15px;color:#fff;
    margin-bottom:14px;display:flex;align-items:center;gap:8px;
  }
  .info-card .title svg{width:18px;height:18px;color:#4a9eff}

  .detail-row{
    display:flex;justify-content:space-between;align-items:center;
    padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.06);
  }
  .detail-row:last-child{border-bottom:none}
  .detail-row .lbl{font-size:12px;color:#8a94a3}
  .detail-row .val{
    font-family:'JetBrains Mono',monospace;
    font-size:13px;color:#fff;font-weight:500;
    display:flex;align-items:center;gap:8px;
  }
  .copy-btn{
    width:28px;height:28px;border-radius:6px;
    background:rgba(74,158,255,0.1);color:#4a9eff;
    border:none;cursor:pointer;display:flex;
    align-items:center;justify-content:center;
    transition:all .15s;
  }
  .copy-btn:hover{background:rgba(74,158,255,0.2)}
  .copy-btn svg{width:14px;height:14px}

  .warn-box{
    background:rgba(255,184,0,0.08);
    border:1px solid rgba(255,184,0,0.2);
    border-radius:12px;padding:14px 16px;
    margin-bottom:24px;
    display:flex;gap:10px;align-items:flex-start;
  }
  .warn-box svg{width:18px;height:18px;color:#ffb800;flex-shrink:0;margin-top:1px}
  .warn-box .txt{font-size:12px;color:#ccc;line-height:1.5}

  .upload-area{
    border:2px dashed rgba(255,255,255,0.12);
    border-radius:14px;padding:32px 20px;
    text-align:center;cursor:pointer;
    transition:all .15s;margin-bottom:16px;
  }
  .upload-area:hover{border-color:rgba(74,158,255,0.4);background:rgba(74,158,255,0.03)}
  .upload-area.has-file{border-color:rgba(62,213,152,0.4);background:rgba(62,213,152,0.03)}
  .upload-area .ic{
    width:52px;height:52px;border-radius:50%;
    background:rgba(74,158,255,0.1);color:#4a9eff;
    display:inline-flex;align-items:center;justify-content:center;
    margin-bottom:12px;
  }
  .upload-area .ic svg{width:24px;height:24px}
  .upload-area .title{font-size:14px;color:#fff;font-weight:500;margin-bottom:4px}
  .upload-area .desc{font-size:11px;color:#8a94a3}
  .upload-area .file-name{
    font-size:13px;color:#3ed598;font-weight:500;
    margin-top:8px;display:none;
  }

  .submit-btn{
    width:100%;padding:16px;border:none;border-radius:12px;
    background:linear-gradient(135deg,#4a9eff,#357abd);
    color:#fff;font-family:'Plus Jakarta Sans',sans-serif;
    font-weight:600;font-size:16px;cursor:pointer;
    transition:all .15s;margin-top:8px;
  }
  .submit-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(74,158,255,0.3)}
  .submit-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none}

  .fee-note{
    text-align:center;font-size:11px;color:#6a7585;margin-top:12px;
  }
</style>















</body>
</html>
