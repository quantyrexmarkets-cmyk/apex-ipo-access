<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Debug Session</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{background:#000;color:#fff;font-family:monospace;padding:20px;font-size:14px;line-height:1.6}
.row{margin:10px 0;padding:10px;background:#111;border-radius:6px}
.k{color:#4a9eff}
.v{color:#3ed598}
.err{color:#ff6a6a}
button{padding:12px 20px;background:#4a9eff;color:#000;border:none;border-radius:6px;font-size:14px;margin:5px;cursor:pointer}
</style>
</head>
<body>
<h2>🔍 Session Debug</h2>
<div id="output">Loading...</div>
<button onclick="location.href='login.html'">Go to login</button>
<button onclick="location.href='verify-email.html'">Go to verify-email</button>
<button onclick="signOutNow()">Sign out</button>

<script>
const sb = window.supabase.createClient(
  'https://tbivhlxkwtklhvsaggwg.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRiaXZobHhrd3RrbGh2c2FnZ3dnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTI0Mjc1MTksImV4cCI6MjA2ODAwMzUxOX0.rw-LXJTPzYJu5TdEP0pgqUguviMJNwzJkpI5uGtR6XY'
);

async function signOutNow(){
  await sb.auth.signOut();
  location.reload();
}

async function show(){
  const out = document.getElementById('output');
  out.innerHTML = '';

  try {
    const { data: sd } = await sb.auth.getSession();
    out.innerHTML += '<div class="row"><span class="k">Session:</span> <span class="v">' + (sd.session ? 'YES' : 'NO') + '</span></div>';
    if(sd.session){
      out.innerHTML += '<div class="row"><span class="k">User email:</span> <span class="v">' + sd.session.user.email + '</span></div>';
      out.innerHTML += '<div class="row"><span class="k">User ID:</span> <span class="v">' + sd.session.user.id + '</span></div>';
      out.innerHTML += '<div class="row"><span class="k">Expires:</span> <span class="v">' + new Date(sd.session.expires_at*1000).toLocaleString() + '</span></div>';

      const { data: p, error: pe } = await sb.from('profiles').select('*').eq('id', sd.session.user.id).single();
      if(pe) out.innerHTML += '<div class="row err">Profile error: ' + pe.message + '</div>';
      else if(p){
        out.innerHTML += '<div class="row"><span class="k">Profile email:</span> <span class="v">' + p.email + '</span></div>';
        out.innerHTML += '<div class="row"><span class="k">kyc_status:</span> <span class="v">' + p.kyc_status + '</span></div>';
        out.innerHTML += '<div class="row"><span class="k">email_verified_at:</span> <span class="v">' + (p.email_verified_at || 'NULL') + '</span></div>';
        out.innerHTML += '<div class="row"><span class="k">is_admin:</span> <span class="v">' + p.is_admin + '</span></div>';
        out.innerHTML += '<div class="row"><span class="k">banned:</span> <span class="v">' + p.banned + '</span></div>';
      }
    }
  } catch(e){
    out.innerHTML += '<div class="row err">ERROR: ' + e.message + '</div>';
  }
}

show();
</script>
</body>
</html>
