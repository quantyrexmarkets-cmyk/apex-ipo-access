<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Inter:wght@300;400;500;600&family=Orbitron:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#000;color:#fff;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}

  .signup-header{
    position:sticky;top:0;z-index:100;

  }
  .header-icons{display:flex;align-items:center;gap:14px}

    width:38px;height:38px;border-radius:50%;
    border:1px solid rgba(255,255,255,0.15);
    display:flex;align-items:center;justify-content:center;

  }

  .progress-bar{
    position:sticky;top:72px;z-index:99;
    height:4px;background:rgba(255,255,255,0.08);width:100%;
  }
  .progress-fill{height:100%;background:#4a9eff;width:88%}

  .step-indicator{
    text-align:center;padding:32px 24px 8px;
    font-size:14px;color:#8a94a3;letter-spacing:0.3px;
  }

  .signup-wrap{max-width:680px;margin:0 auto;padding:0 24px 120px}
  .signup-wrap h1{

    font-size:clamp(32px,6vw,42px);line-height:1.15;
    letter-spacing:-0.8px;margin-bottom:32px;text-align:center;color:#fff;
  }
  .section-h2{
    font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;
    font-size:20px;letter-spacing:-0.3px;color:#fff;
    margin:36px 0 18px;padding-top:24px;
    border-top:1px solid rgba(255,255,255,0.08);
  }
  .section-h2:first-of-type{border-top:none;padding-top:0;margin-top:0}

  .back-link{
    display:inline-flex;align-items:center;gap:8px;
    margin:24px 0 8px;
    font-size:14px;color:#4a9eff;font-weight:500;
  }

  .form-grid{display:flex;flex-direction:column;gap:18px}
  .form-row{display:flex;gap:10px}

  .form-group{display:flex;flex-direction:column}
  .form-group.flex-1{flex:1}
  .form-group.w-zip{width:110px;flex-shrink:0}
  .form-group label{
    font-size:13px;color:#a8b2c1;
    margin-bottom:8px;font-weight:500;letter-spacing:0.2px;
  }
  .form-group label .req{color:#4a9eff;margin-left:2px}

  .form-group input,
  .form-group select{
    width:100%;
    background:transparent;color:#fff;
    border:1px solid rgba(255,255,255,0.18);
    padding:11px 12px;font-size:13px;
    font-family:inherit;
    transition:border .15s;
    border-radius:0;
  }
  .form-group input:focus,
  .form-group select:focus{
    outline:none;border-color:#4a9eff;
  }
  .form-group input::placeholder{color:#5a6473}
  .form-group select{
    appearance:none;-webkit-appearance:none;
    background-image:url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234a9eff' stroke-width='2'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
    background-repeat:no-repeat;
    background-position:right 10px center;
    background-size:16px;
    padding-right:36px;
    cursor:pointer;
  }
  .form-group select option{background:#0a0a0a;color:#fff}

  /* Custom checkbox */
  .checkbox-row{
    display:flex;align-items:flex-start;gap:12px;
    margin:8px 0 4px;cursor:pointer;
    padding:14px 0;
  }
  .checkbox-row .cb{
    width:22px;height:22px;
    border:1.5px solid rgba(255,255,255,0.3);
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    transition:all .15s;
    margin-top:1px;
  }
  .checkbox-row.checked .cb{background:#4a9eff;border-color:#4a9eff}
  .checkbox-row .cb::after{
    content:"";width:11px;height:6px;
    border-left:2px solid #000;border-bottom:2px solid #000;
    transform:rotate(-45deg) translate(1px,-1px);
    opacity:0;transition:opacity .15s;
  }
  .checkbox-row.checked .cb::after{opacity:1}
  .checkbox-row .cb-label{
    font-size:14px;color:#cfd8e8;line-height:1.5;
  }

  .disclosure-note{
    margin-top:32px;padding:18px;
    background:rgba(74,158,255,0.05);
    border:1px solid rgba(74,158,255,0.15);
    border-radius:10px;

  }
  .disclosure-note strong{color:#4a9eff}

  .continue-bar{
    position:fixed;bottom:0;left:0;right:0;
    background:#000;padding:20px 24px 28px;

  .continue-btn{

    background:#4a9eff;color:#000;
    padding:18px;text-align:center;
    font-size:16px;font-weight:600;
    border:none;cursor:pointer;
  }

  .form-group input.invalid,
  .form-group select.invalid{border-color:#ff4a4a}
  .form-group input.valid,
  .form-group select.valid{border-color:#3ed598}
  .field-error{font-size:12px;color:#ff6a6a;margin-top:6px;min-height:14px;letter-spacing:.2px}
</style>

>Macao</option><option>Madagascar</option><option>Malawi</option><option>Malaysia</option><option>Maldives</option><option>Mali</option><option>Malta</option><option>Mauritania</option><option>Mauritius</option><option>Mexico</option><option>Moldova</option><option>Monaco</option><option>Mongolia</option><option>Montenegro</option><option>Morocco</option><option>Mozambique</option><option>Myanmar</option><option>Namibia</option><option>Nepal</option><option>Netherlands</option><option>New Zealand</option><option>Nicaragua</option><option>Niger</option><option>Nigeria</option><option>North Macedonia</option><option>Norway</option><option>Oman</option><option>Pakistan</option><option>Panama</option><option>Papua New Guinea</option><option>Paraguay</option><option>Peru</option><option>Philippines</option><option>Poland</option><option>Portugal</option><option>Qatar</option><option>Romania</option><option>Russia</option><option>Rwanda</option><option>Saudi Arabia</option><option>Senegal</option><option>Serbia</option><option>Singapore</option><option>Slovakia</option><option>Slovenia</option><option>Somalia</option><option>South Africa</option><option>South Korea</option><option>Spain</option><option>Sri Lanka</option><option>Sudan</option><option>Sweden</option><option>Switzerland</option><option>Syria</option><option>Taiwan</option><option>Tajikistan</option><option>Tanzania</option><option>Thailand</option><option>Togo</option><option>Trinidad and Tobago</option><option>Tunisia</option><option>Turkey</option><option>Turkmenistan</option><option>Uganda</option><option>Ukraine</option><option>United Arab Emirates</option><option>United Kingdom</option><option>Uruguay</option><option>Uzbekistan</option><option>Venezuela</option><option>Vietnam</option><option>Yemen</option><option>Zambia</option><option>Zimbabwe</option>

<script>
(function(){
  const form = document.getElementById('addressForm');
  if(!form){ console.error('addressForm not found'); return; }

  function isUS(){
    var v = document.getElementById('citizenship').value;
    return v === 'us_citizen' || v === 'us_permanent_resident' || v === 'us_visa_holder';
  }
  function getDefs(){
    var defs = [
      {id:'citizenship', type:'select', req:'Select your citizenship status'},
      {id:'addr1',       type:'text',  re:/^.{3,}$/, bad:'Enter a valid street address', req:'Address is required'},
      {id:'zip',         type:'text',  re: isUS() ? /^\d{5}(-\d{4})?$/ : /^.{2,}$/, bad: isUS() ? 'Enter a valid US ZIP (e.g. 90210)' : 'Enter a valid postal code', req:'Postal code is required'},
      {id:'city',        type:'text',  re:/^[A-Za-z][A-Za-z\.\-' ]{1,60}$/, bad:'Enter a valid city name', req:'City is required'}
    ];
    if(isUS()){
      defs.push({id:'state', type:'select', req:'Select a state'});
    } else {
      defs.push({id:'country', type:'select', req:'Select your country'});
      defs.push({id:'stateIntl', type:'text', re:/^.{2,}$/, bad:'Enter a valid state/province', req:'State or province required'});
    }
    var mc = document.getElementById('mailingCb');
    if(mc && mc.classList.contains('checked')){
      defs.push({id:'mAddr1', type:'text', re:/^.{3,}$/, bad:'Enter a valid address', req:'Mailing address required'});
      defs.push({id:'mZip', type:'text', re:/^.{2,}$/, bad:'Enter a valid postal code', req:'Mailing ZIP required'});
      defs.push({id:'mCity', type:'text', re:/^[A-Za-z][A-Za-z\.\-' ]{1,60}$/, bad:'Enter a valid city', req:'Mailing city required'});
      defs.push({id:'mState', type:'text', re:/^.{2,}$/, bad:'Enter a valid state', req:'Mailing state required'});
    }
    return defs;
  }
  var defs = getDefs();

  function errEl(input){
    let e = input.parentElement.querySelector('.field-error');
    if(!e){
      e = document.createElement('div');
      e.className = 'field-error';
      input.parentElement.appendChild(e);
    }
    return e;
  }

  function check(d, showReq){
    const el = document.getElementById(d.id);
    if(!el) return false;
    const v = el.value.trim();
    const e = errEl(el);
    if(v === ''){
      if(showReq){
        el.classList.add('invalid'); el.classList.remove('valid');
        e.textContent = d.req;
      } else {
        el.classList.remove('valid','invalid');
        e.textContent = '';
      }
      return false;
    }
    let ok = true;
    if(d.re) ok = d.re.test(v);
    el.classList.toggle('valid', ok);
    el.classList.toggle('invalid', !ok);
    e.textContent = ok ? '' : (d.bad || '');
    return ok;
  }

  // ===== Attach validators =====
  function attachValidators(){
    defs.forEach(d => {
      const el = document.getElementById(d.id);
      if(!el || el.dataset.boundVal) return;
      el.dataset.boundVal = '1';
      const evt = (d.type === 'select') ? 'change' : 'input';
      el.addEventListener(evt, () => check(d, false));
      el.addEventListener('blur', () => check(d, true));
    });
  }
  attachValidators();

  // ===== Citizenship change =====
  const citizenshipEl = document.getElementById('citizenship');
  const usStateWrap = document.getElementById('usStateWrap');
  const intlStateWrap = document.getElementById('intlStateWrap');
  const countryWrap = document.getElementById('countryWrap');

  citizenshipEl.addEventListener('change', function(){
    const us = isUS();
    usStateWrap.style.display = us ? 'block' : 'none';
    intlStateWrap.style.display = us ? 'none' : 'block';
    countryWrap.style.display = us ? 'none' : 'block';
    defs = getDefs();
    attachValidators();
  });

  // ===== Mailing checkbox toggle =====
  const mailingCb = document.getElementById('mailingCb');
  const mailingFields = document.getElementById('mailingFields');
  mailingCb.addEventListener('click', function(){
    mailingCb.classList.toggle('checked');
    const checked = mailingCb.classList.contains('checked');
    mailingFields.style.display = checked ? 'block' : 'none';
    defs = getDefs();
    attachValidators();
  });
  mailingCb.addEventListener('keydown', function(e){
    if(e.key === ' ' || e.key === 'Enter'){
      e.preventDefault();
      mailingCb.click();
    }
  });

  // ===== Submit =====
  form.addEventListener('submit', function(ev){
    ev.preventDefault();
    defs = getDefs();
    let allOk = true;
    defs.forEach(d => { if(!check(d, true)) allOk = false; });
    if(allOk){
      const us = isUS();
      const payload = {
        addr1: document.getElementById('addr1')?.value?.trim() || '',
        addr2: document.getElementById('addr2')?.value?.trim() || '',
        city: document.getElementById('city')?.value?.trim() || '',
        state: us ? (document.getElementById('state')?.value || '') : (document.getElementById('stateIntl')?.value?.trim() || ''),
        zip: document.getElementById('zip')?.value?.trim() || '',
        country: us ? 'United States' : (document.getElementById('country')?.value || ''),
        citizenship: document.getElementById('citizenship')?.value || ''
      };
      if(mailingCb.classList.contains('checked')){
        payload.mailing = {
          addr1: document.getElementById('mAddr1')?.value?.trim() || '',
          addr2: document.getElementById('mAddr2')?.value?.trim() || '',
          city: document.getElementById('mCity')?.value?.trim() || '',
          state: document.getElementById('mState')?.value?.trim() || '',
          zip: document.getElementById('mZip')?.value?.trim() || ''
        };
      }
      window.apex.saveStep('address', payload);
      window.location.href = 'signup-6.html';
    } else {
      const bad = form.querySelector('.invalid');
      if(bad) bad.focus();
    }
  });
})();
</script>
