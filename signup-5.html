<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Address & Citizenship | APEX IPO ACCESS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Inter:wght@300;400;500;600&family=Orbitron:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#000;color:#fff;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}

  .signup-header{
    position:sticky;top:0;z-index:100;
    background:rgba(0,0,0,0.92);backdrop-filter:blur(20px);
    border-bottom:1px solid rgba(255,255,255,0.08);

    display:flex;justify-content:space-between;align-items:center;
  }
  .header-icons{display:flex;align-items:center;gap:14px}

    width:38px;height:38px;border-radius:50%;
    border:1px solid rgba(255,255,255,0.15);
    display:flex;align-items:center;justify-content:center;
    color:#4a9eff;
  }

  .progress-bar{
    position:sticky;top:72px;z-index:99;
    height:4px;background:rgba(255,255,255,0.08);width:100%;
  }
  .progress-fill{height:100%;background:#4a9eff;width:88%}

  .step-indicator{
    text-align:center;padding:32px 24px 8px;
    font-size:14px;color:#8a94a3;letter-spacing:0.3px;
  }

  .signup-wrap{max-width:680px;margin:0 auto;padding:0 24px 120px}
  .signup-wrap h1{
    font-family:'Plus Jakarta Sans',sans-serif;font-weight:400;
    font-size:clamp(32px,6vw,42px);line-height:1.15;
    letter-spacing:-0.8px;margin-bottom:32px;text-align:center;color:#fff;
  }
  .section-h2{
    font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;
    font-size:20px;letter-spacing:-0.3px;color:#fff;
    margin:36px 0 18px;padding-top:24px;
    border-top:1px solid rgba(255,255,255,0.08);
  }
  .section-h2:first-of-type{border-top:none;padding-top:0;margin-top:0}

  .back-link{
    display:inline-flex;align-items:center;gap:8px;
    margin:24px 0 8px;
    font-size:14px;color:#4a9eff;font-weight:500;
  }

  .form-grid{display:flex;flex-direction:column;gap:18px}
  .form-row{display:flex;gap:10px}

  .form-group{display:flex;flex-direction:column}
  .form-group.flex-1{flex:1}
  .form-group.w-zip{width:110px;flex-shrink:0}
  .form-group label{
    font-size:13px;color:#a8b2c1;
    margin-bottom:8px;font-weight:500;letter-spacing:0.2px;
  }
  .form-group label .req{color:#4a9eff;margin-left:2px}

  .form-group input,
  .form-group select{
    width:100%;
    background:transparent;color:#fff;
    border:1px solid rgba(255,255,255,0.18);
    padding:11px 12px;font-size:13px;
    font-family:inherit;
    transition:border .15s;
    border-radius:0;
  }
  .form-group input:focus,
  .form-group select:focus{
    outline:none;border-color:#4a9eff;
  }
  .form-group input::placeholder{color:#5a6473}
  .form-group select{
    appearance:none;-webkit-appearance:none;
    background-image:url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234a9eff' stroke-width='2'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
    background-repeat:no-repeat;
    background-position:right 10px center;
    background-size:16px;
    padding-right:36px;
    cursor:pointer;
  }
  .form-group select option{background:#0a0a0a;color:#fff}

  /* Custom checkbox */
  .checkbox-row{
    display:flex;align-items:flex-start;gap:12px;
    margin:8px 0 4px;cursor:pointer;
    padding:14px 0;
  }
  .checkbox-row .cb{
    width:22px;height:22px;
    border:1.5px solid rgba(255,255,255,0.3);
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    transition:all .15s;
    margin-top:1px;
  }
  .checkbox-row.checked .cb{background:#4a9eff;border-color:#4a9eff}
  .checkbox-row .cb::after{
    content:"";width:11px;height:6px;
    border-left:2px solid #000;border-bottom:2px solid #000;
    transform:rotate(-45deg) translate(1px,-1px);
    opacity:0;transition:opacity .15s;
  }
  .checkbox-row.checked .cb::after{opacity:1}
  .checkbox-row .cb-label{
    font-size:14px;color:#cfd8e8;line-height:1.5;
  }

  .disclosure-note{
    margin-top:32px;padding:18px;
    background:rgba(74,158,255,0.05);
    border:1px solid rgba(74,158,255,0.15);
    border-radius:10px;
    font-size:12px;color:#8a94a3;line-height:1.6;
  }
  .disclosure-note strong{color:#4a9eff}

  .continue-bar{
    position:fixed;bottom:0;left:0;right:0;
    background:#000;padding:20px 24px 28px;
    border-top:1px solid rgba(255,255,255,0.08);
    z-index:50;
  }
  .continue-btn{
    display:block;width:100%;max-width:632px;margin:0 auto;
    background:#4a9eff;color:#000;
    padding:18px;text-align:center;
    font-size:16px;font-weight:600;
    border:none;cursor:pointer;
  }

  .form-group input.invalid,
  .form-group select.invalid{border-color:#ff4a4a}
  .form-group input.valid,
  .form-group select.valid{border-color:#3ed598}
  .field-error{font-size:12px;color:#ff6a6a;margin-top:6px;min-height:14px;letter-spacing:.2px}
</style>
<script src="js/supabase.js"></script>
</head>
<body>

  <div class="header-icons">
    <a href="#" class="icon-link" title="Secure session" aria-label="Secure session">

        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>

    <a href="contact.html" class="icon-link" title="Contact support" aria-label="Contact support">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
      </svg>

  </div>
</header>

<div class="progress-bar"><div class="progress-fill"></div></div>

<div class="step-indicator">Brokerage · Address & residency</div>

<div class="signup-wrap">
  <a href="signup-4.html" class="back-link">← Back</a>
  <h1>Residential address</h1>

  <form id="addressForm" novalidate>

    <h2 class="section-h2">Address</h2>
    <div class="form-grid">

      <div class="form-group">
        <label for="addr1">Address line 1 <span class="req">*</span></label>
        <input type="text" id="addr1" name="addr1" placeholder="Street number and name" autocomplete="address-line1">
      </div>

      <div class="form-group">
        <label for="addr2">Address line 2</label>
        <input type="text" id="addr2" name="addr2" placeholder="Apartment, suite, unit (optional)" autocomplete="address-line2">
      </div>

      <div class="form-row">
        <div class="form-group w-zip">
          <label for="zip">ZIP code <span class="req">*</span></label>
          <input type="text" id="zip" name="zip" maxlength="10" autocomplete="postal-code">
        </div>
        <div class="form-group flex-1">
          <label for="city">City <span class="req">*</span></label>

      </div>

        <label for="state">State <span class="req">*</span></label>
        <select id="state" name="state">

          <option value="IL">Illinois</option>
          <option value="IN">Indiana</option>
          <option value="IA">Iowa</option>
          <option value="KS">Kansas</option>
          <option value="KY">Kentucky</option>
          <option value="LA">Louisiana</option>
          <option value="ME">Maine</option>
          <option value="MD">Maryland</option>
          <option value="MA">Massachusetts</option>
          <option value="MI">Michigan</option>
          <option value="MN">Minnesota</option>
          <option value="MS">Mississippi</option>
          <option value="MO">Missouri</option>
          <option value="MT">Montana</option>
          <option value="NE">Nebraska</option>
          <option value="NV">Nevada</option>
          <option value="NH">New Hampshire</option>
          <option value="NJ">New Jersey</option>
          <option value="NM">New Mexico</option>
          <option value="NY">New York</option>

<div class="continue-bar">
  <button class="continue-btn" form="addressForm" type="submit">Continue</button>
</div>

<script>
(function(){
  const form = document.getElementById('addressForm');
  if(!form){ console.error('addressForm not found'); return; }

  const defs = [
    {id:'addr1',       type:'text',  re:/^.{3,}$/,                bad:'Enter a valid street address', req:'Address is required'},
    {id:'zip',         type:'text',  re:/^\d{5}(-\d{4})?$/,      bad:'Enter a valid ZIP (e.g. 90210)', req:'ZIP code is required'},
    {id:'city',        type:'text',  re:/^[A-Za-z][A-Za-z\.\-' ]{1,60}$/, bad:'Enter a valid city name', req:'City is required'},
    {id:'state',       type:'select',                              req:'Select a state'},
    {id:'citizenship', type:'select',                              req:'Select your citizenship status'}
  ];

  function errEl(input){
    let e = input.parentElement.querySelector('.field-error');
    if(!e){
      e = document.createElement('div');
      e.className = 'field-error';
      input.parentElement.appendChild(e);
    }
    return e;
  }

  function check(d, showReq){
    const el = document.getElementById(d.id);
    if(!el) return false;
    const v = el.value.trim();
    const e = errEl(el);
    if(v === ''){
      if(showReq){
        el.classList.add('invalid'); el.classList.remove('valid');
        e.textContent = d.req;
      } else {
        el.classList.remove('valid','invalid');
        e.textContent = '';
      }
      return false;
    }
    let ok = true;
    if(d.re) ok = d.re.test(v);
    el.classList.toggle('valid', ok);
    el.classList.toggle('invalid', !ok);
    e.textContent = ok ? '' : (d.bad || '');
    return ok;
  }

  defs.forEach(d => {
    const el = document.getElementById(d.id);
    if(!el) return;
    const evt = (d.type === 'select') ? 'change' : 'input';
    el.addEventListener(evt, () => check(d, false));
    el.addEventListener('blur', () => check(d, true));
  });

  form.addEventListener('submit', function(ev){
    ev.preventDefault();
    let allOk = true;
    defs.forEach(d => { if(!check(d, true)) allOk = false; });
    if(allOk){
      window.apex.saveStep('address', {
        addr1: document.getElementById('addr1')?.value?.trim() || '',
        addr2: document.getElementById('addr2')?.value?.trim() || '',
        city: document.getElementById('city')?.value?.trim() || '',
        state: document.getElementById('state')?.value || '',
        zip: document.getElementById('zip')?.value?.trim() || '',
        citizenship: document.getElementById('citizenship')?.value || ''
      });
      window.location.href = 'signup-6.html';
    } else {
      const bad = form.querySelector('.invalid');
      if(bad) bad.focus();
    }
  });
})();
</script>

</body>
